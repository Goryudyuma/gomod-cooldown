name: Go formatting

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: go-formatting-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  format:
    # Fork pull requests receive a read-only GITHUB_TOKEN, so they cannot
    # safely create a formatting pull request. The ordinary CI still runs.
    if: github.event.action == 'closed' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: github.event.action != 'closed'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: github.event.action != 'closed'
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        if: github.event.action != 'closed'
        with:
          version: latest
          install-only: true
      - run: golangci-lint fmt
        if: github.event.action != 'closed'
      - uses: dev-hato/actions-diff-pr-management@5cd3792bc98beed11cda90898bc81af6bfa199af # v2.2.5
        if: success() || failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch-name-prefix: chore/gofmt
          pr-title-prefix: "chore: apply Go formatting"
          pr-description-prefix: "Automated formatting changes produced by golangci-lint fmt."
          exit-failure: false
